[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --alluredir=allure-results
    --strict-markers
    --tb=short

markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录测试
    user_management: 用户管理测试
    navigation: 导航测试
    multi_browser: 多浏览器测试
    browser: 指定浏览器测试

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
